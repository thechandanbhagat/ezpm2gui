name: Release

# @group Trigger : Runs when a version tag like v1.0.0 is pushed
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  release:
    name: Build, Publish & Release
    runs-on: ubuntu-latest

    steps:
      # @group Setup : Checkout and Node.js environment
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # @group Dependencies : Install root and client deps
      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Install client dependencies
        run: cd src/client && npm ci --legacy-peer-deps

      # @group Build : Full three-step build (server TS + React client + bin TS)
      - name: Build
        run: npm run build

      # @group Version : Extract tag name for use in later steps
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # @group Publish : Push package to npm registry
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # @group Release : Auto-generate changelog from commits since last tag
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---
            Install or upgrade:
            ```bash
            npm install -g ezpm2gui@${{ steps.version.outputs.VERSION }}
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
