<svg width="40" height="40" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ezpm2guiLogoTitle">
  <title id="ezpm2guiLogoTitle">EZ PM2 GUI logo</title>
  <defs>
    <linearGradient id="ezpm2guiBg" x1="88" y1="64" x2="424" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.52" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="ezpm2guiAccent" x1="118" y1="188" x2="352" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="ezpm2guiGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#22D3EE" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#22C55E" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- @group LogoMark : EZ PM2 GUI terminal and process-status mark -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#ezpm2guiBg)"/>
  <rect x="48" y="48" width="416" height="416" rx="84" stroke="#1F2937" stroke-width="16"/>
  <path d="M96 160H416" stroke="#1E293B" stroke-width="18" stroke-linecap="round"/>
  <circle cx="134" cy="160" r="10" fill="#EF4444"/>
  <circle cx="170" cy="160" r="10" fill="#F59E0B"/>
  <circle cx="206" cy="160" r="10" fill="#22C55E"/>
  <path d="M138 224L190 256L138 288" stroke="url(#ezpm2guiAccent)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" filter="url(#ezpm2guiGlow)"/>
  <path d="M218 304H292" stroke="#E5E7EB" stroke-width="34" stroke-linecap="round"/>
  <path d="M354 188V348" stroke="#334155" stroke-width="24" stroke-linecap="round"/>
  <circle cx="354" cy="196" r="27" fill="#22C55E" stroke="#BBF7D0" stroke-width="10"/>
  <circle cx="354" cy="256" r="27" fill="#22D3EE" stroke="#A5F3FC" stroke-width="10"/>
  <circle cx="354" cy="336" r="27" fill="#F59E0B" stroke="#FDE68A" stroke-width="10"/>
  <path d="M116 376H398" stroke="#1E293B" stroke-width="18" stroke-linecap="round"/>
</svg>
